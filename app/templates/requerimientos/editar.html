{% extends "base.html" %}
{% block title %}Editar {{ req.identificador }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Editar: {{ req.identificador }}</h1>
    <a href="{{ url_for('requerimientos.detalle', id=req.id) }}" class="btn btn-secondary">Volver</a>
</div>
<div class="card" style="max-width:700px">
    <form method="post">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
                <label>Identificador</label>
                <input type="text" class="form-control" id="preview_identificador" value="{{ req.identificador }}" readonly disabled>
                <small class="form-text" id="aviso_id" style="display:none;color:#e65100">Se reasignará al guardar.</small>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select name="tipo" id="sel_tipo" class="form-control">
                    <option value="funcional" {% if req.tipo == 'funcional' %}selected{% endif %}>Funcional</option>
                    <option value="no_funcional" {% if req.tipo == 'no_funcional' %}selected{% endif %}>No Funcional</option>
                </select>
            </div>
            <div class="form-group" id="g_cat" {% if req.tipo != 'no_funcional' %}style="display:none"{% endif %}>
                <label>Categoría</label>
                <select name="categoria" class="form-control">
                    {% for c in categorias %}<option value="{{ c }}" {% if req.categoria == c %}selected{% endif %}>{{ c|capitalize }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Prioridad</label>
                <select name="prioridad" class="form-control">
                    {% for p in ['alta','media','baja'] %}
                    <option value="{{ p }}" {% if req.prioridad == p %}selected{% endif %}>{{ p }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Estado</label>
                <select name="estado" class="form-control">
                    {% for e in ['pendiente','activo','completado','cancelado'] %}
                    <option value="{{ e }}" {% if req.estado == e %}selected{% endif %}>{{ e }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Descripción *</label>
            <textarea name="descripcion" class="form-control" rows="4" required>{{ req.descripcion }}</textarea>
        </div>
        <div class="form-group">
            <label>Motivo del cambio</label>
            <input type="text" name="descripcion_cambio" class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="{{ url_for('requerimientos.detalle', id=req.id) }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
    <form method="post" action="{{ url_for('requerimientos.eliminar', id=req.id) }}" style="display:inline"
          onsubmit="return confirm('¿Eliminar requerimiento?')">
        <button type="submit" class="btn btn-danger">Eliminar</button>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const selTipo = document.getElementById('sel_tipo');
const previewIdentificador = document.getElementById('preview_identificador');
const avisoId = document.getElementById('aviso_id');
const tipoOriginal = '{{ req.tipo }}';
const idOriginal = '{{ req.identificador }}';
const proyectoIdActual = {{ req.proyecto_id }};

function actualizarPreviewId() {
    if (selTipo.value === tipoOriginal) {
        previewIdentificador.value = idOriginal;
        avisoId.style.display = 'none';
        return;
    }
    fetch(`{{ url_for('requerimientos.siguiente_id') }}?proyecto_id=${proyectoIdActual}&tipo=${selTipo.value}`)
        .then(r => r.json())
        .then(data => {
            previewIdentificador.value = data.identificador || '—';
            avisoId.style.display = '';
        });
}

selTipo.addEventListener('change', function(){
    document.getElementById('g_cat').style.display = this.value === 'no_funcional' ? '' : 'none';
    actualizarPreviewId();
});
</script>
{% endblock %}
