{% extends "base.html" %}
{% block title %}Editar Proyecto{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Editar: {{ proyecto.nombre }}</h1>
    <a href="{{ url_for('proyectos.detalle', id=proyecto.id) }}" class="btn btn-secondary">Volver</a>
</div>
<div class="card" style="max-width:600px">
    <form method="post">
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="nombre" class="form-control" value="{{ proyecto.nombre }}" required>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" class="form-control" rows="3">{{ proyecto.descripcion or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('proyectos.detalle', id=proyecto.id) }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
